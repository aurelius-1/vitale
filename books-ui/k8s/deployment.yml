apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-ui
  labels:
    app: books-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: books-ui
  template:
    metadata:
      labels:
        app: books-ui
    spec:
      containers:
        - name: books-ui
          image: books-ui
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5" ]
          ports:
            - containerPort: 80
