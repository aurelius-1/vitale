apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitale
  labels:
    app: vitale

spec:
  replicas: 1
  selector:
    matchLabels:
      app: vitale
  template:
    metadata:
      labels:
        app: vitale
    spec:
      containers:
        - name: vitale
          image: vitale
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5"]
          ports:
            - containerPort: 9001
            - containerPort: 8001
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8001"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://polar-postgres/polardb_catalog
            - name: SPRING_PROFILES_ACTIVE
              value: testdata
            - name: S3_ENDPOINT
              value: http://polar-minio:9000